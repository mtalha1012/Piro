<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piro | GitHub Code Stitcher</title>
    <link rel="stylesheet" href="style.css">
    <!-- Required Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://unpkg.com/docx@8.2.3/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Home Screen -->
        <div id="homeScreen">
            <div class="header">
                <h1>Piro</h1>
                <p>Stitch any GitHub repository into a single document.</p>
            </div>
            
            <form id="repoForm">
                <div class="input-group">
                    <label>Repository URL</label>
                    <input type="text" id="repoUrl" placeholder="https://github.com/owner/repo" required>
                </div>
                
                <div class="input-group" id="tokenSection" class="hidden">
                    <label>GitHub Token (Optional - For massive repos)</label>
                    <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxx">
                </div>

                <button type="submit" id="fetchBtn">
                    <span id="fetchBtnText">Fetch Repository</span>
                    <span id="fetchLoader" class="hidden">Loading...</span>
                </button>
            </form>
            <div id="statusMessage" class="hidden"></div>
        </div>

        <!-- Selection UI -->
        <div id="selectionUI" class="hidden">
            <div class="header-nav">
                <button id="backBtn" class="secondary-btn">← Back</button>
                <h2 id="displayRepoName">owner / repo</h2>
            </div>

            <!-- Settings Panel -->
            <div class="settings-panel">
                <div class="settings-row">
                    <div class="settings-group">
                        <label>Export Format:</label>
                        <div class="pill-group" id="exportFormatGroup">
                            <button type="button" class="pill active" data-value="docx">Word (.docx)</button>
                            <button type="button" class="pill" data-value="md">Markdown (.md)</button>
                        </div>
                    </div>
                    <div class="settings-group" id="themeRow">
                        <label>Code Theme:</label>
                        <div class="pill-group" id="themeGroup">
                            <button type="button" class="pill active" data-value="dark">VS Dark</button>
                            <button type="button" class="pill" data-value="light">VS Light</button>
                        </div>
                    </div>
                </div>

                <div class="settings-row">
                    <div class="settings-group">
                        <label>Include Images?</label>
                        <div class="pill-group" id="imagesGroup">
                            <button type="button" class="pill active" data-value="yes">Yes</button>
                            <button type="button" class="pill" data-value="no">No</button>
                        </div>
                    </div>
                    <div class="settings-group">
                        <label>Selection Mode:</label>
                        <div class="pill-group" id="selectionModeGroup">
                            <button type="button" class="pill active" data-value="include">Include Checked</button>
                            <button type="button" class="pill" data-value="exclude">Exclude Checked</button>
                        </div>
                    </div>
                </div>

                <!-- NEW: Filter Strategy Setup -->
                <div class="settings-row border-top">
                    <div class="settings-group full-width">
                        <label>Repository Filter Strategy:</label>
                        <div class="pill-group" id="filterStrategyGroup">
                            <button type="button" class="pill active" data-value="auto">Ignore Unnecessary Files (Auto)</button>
                            <button type="button" class="pill" data-value="custom">Custom Extensions</button>
                        </div>
                    </div>
                </div>

                <!-- NEW: Dynamic Extension Grid -->
                <div id="customExtensionContainer" class="hidden full-width">
                    <label>Select Extensions to Include:</label>
                    <div id="extensionList" class="extension-grid"></div>
                </div>
            </div>

            <!-- Tree View -->
            <div class="tree-header">
                <label class="select-all-wrapper">
                    <input type="checkbox" id="selectAllBtn"> Select All / None
                </label>
            </div>
            <div id="treeContainer"></div>

            <!-- Generate Button & Progress -->
            <button id="generateBtn" disabled>
                <span id="genBtnText">Generate Document</span>
                <span id="genLoader" class="hidden">Compiling...</span>
            </button>

            <div id="progressContainer" class="hidden">
                <div class="progress-bar"><div id="progressBarFill"></div></div>
                <div id="progressCount">0/0</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
